<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价格侦测公开大盘 | 淘宝监控系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5CF6;
            --primary-hover: #7C3AED;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --bg-color: #0F172A;
            --surface: #1E293B;
            --surface-hover: #334155;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border: #334155;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.2s ease-out;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 100%, 74%, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(225, 100%, 50%, 0.05) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            color: var(--primary);
        }

        .share-badge {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
            padding: 0.4rem 1rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
        }

        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            background: rgba(30, 41, 59, 0.5);
        }

        .tab-btn {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 1rem 1.25rem;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }

        .stats-bar {
            display: flex;
            gap: 0.8rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .stat-chip {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.4rem 0.8rem;
            border-radius: 999px;
            font-size: 0.75rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .stat-val {
            font-weight: 700;
            font-family: var(--font-mono);
        }

        .sku-list-header {
            display: grid;
            grid-template-columns: 80px 2fr 1.2fr 80px 80px 70px 90px 40px;
            gap: 0.8rem;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.1);
        }

        .sku-list {
            overflow-y: auto;
            flex: 1;
        }

        .sku-row {
            display: grid;
            grid-template-columns: 80px 2fr 1.2fr 80px 80px 70px 90px 40px;
            gap: 0.8rem;
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            align-items: center;
            font-size: 0.8125rem;
        }

        .sku-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .shop-name {
            color: var(--primary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sku-price {
            font-weight: 700;
            font-family: var(--font-mono);
            text-align: right;
        }

        .sku-diff {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-align: right;
        }

        .sku-diff.flat {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
        }

        .sku-diff.down {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .sku-diff.up {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .timeline-panel {
            display: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .timeline-panel.open {
            display: block;
        }

        .tl-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            border-bottom: 1px dashed var(--border);
        }

        .tl-time {
            color: var(--text-muted);
        }

        .table-wrapper {
            overflow: auto;
            flex: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }

        th {
            position: sticky;
            top: 0;
            background: var(--surface);
            padding: 0.8rem 1.2rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
            z-index: 10;
            text-align: left;
        }

        td {
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid var(--border);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-muted);
            gap: 1rem;
        }

        .empty-state i {
            font-size: 2.5rem;
            opacity: 0.4;
        }

        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
                gap: 0.5rem;
            }

            .sku-list-header,
            .sku-row {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 0.5rem;
            }

            .sku-list-header span:nth-child(1),
            .sku-list-header span:nth-child(3),
            .sku-list-header span:nth-child(5),
            .sku-list-header span:nth-child(7),
            .sku-row div:nth-child(1),
            .sku-row div:nth-child(3),
            .sku-row div:nth-child(5),
            .sku-row div:nth-child(7) {
                display: none;
            }

            .card-header {
                padding: 0.8rem 1rem;
            }

            .stats-bar {
                padding: 0.8rem 1rem;
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body>
    <div class="header-area">
        <div class="logo">
            <i class="ri-radar-line"></i>
            <span>价阵公开看板</span>
        </div>
        <div class="share-badge">
            <i class="ri-global-line"></i> 只读视图
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div style="display:flex; align-items:center; gap:0.5rem;"><i class="ri-line-chart-fill"></i> 数据资产实时追踪</div>
            <button class="btn-outline" style="padding: 0.3rem 0.7rem; font-size: 0.75rem;"
                onclick="refreshCurrentTab()">
                <i class="ri-refresh-line"></i> 刷新数据
            </button>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" data-tab="price-changes" onclick="switchTab('price-changes')">价格动态侦测</button>
            <button class="tab-btn" data-tab="full-history" onclick="switchTab('full-history')">历史记录归档</button>
        </div>

        <!-- Tab 1 -->
        <div class="tab-content active" id="tab-price-changes">
            <div class="stats-bar">
                <div class="stat-chip"><i class="ri-links-line" style="color:var(--primary);"></i> URL总数: <span
                        class="stat-val" id="stat-url-total">0</span></div>
                <div class="stat-chip"><i class="ri-box-3-line" style="color:var(--primary);"></i> SKU总数: <span
                        class="stat-val" id="stat-total">0</span></div>
                <div class="stat-chip"><i class="ri-alarm-warning-line" style="color:var(--warning);"></i> 最新变价: <span
                        class="stat-val" id="stat-changed">0</span></div>
                <div class="stat-chip"><i class="ri-time-line"></i> 最后同步: <span class="stat-val" id="stat-time">-</span>
                </div>
            </div>
            <div class="sku-list-header">
                <span>店铺</span>
                <span>商品</span>
                <span>属性规格</span>
                <span style="text-align:right;">时效性</span>
                <span style="text-align:right;">当前价</span>
                <span style="text-align:center;">库存</span>
                <span style="text-align:right;">波动</span>
                <span></span>
            </div>
            <div class="sku-list" id="sku-list-container">
                <div class="empty-state"><i class="ri-loader-4-line spin"></i>
                    <p>正在同步云端矩阵...</p>
                </div>
            </div>
        </div>

        <!-- Tab 2 -->
        <div class="tab-content" id="tab-full-history">
            <div class="table-wrapper">
                <table id="history-table">
                    <thead id="history-thead">
                        <tr>
                            <th>获取时间</th>
                            <th>店铺</th>
                            <th>商品名</th>
                            <th>规格</th>
                            <th style="text-align:right;">价格</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr>
                            <td colspan="5">
                                <div class="empty-state">
                                    <p>正在加载归档数据...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'price-changes';
        let historyLoaded = false;

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
            document.getElementById('tab-price-changes').classList.toggle('active', tab === 'price-changes');
            document.getElementById('tab-full-history').classList.toggle('active', tab === 'full-history');
            if (tab === 'full-history' && !historyLoaded) { loadHistory(); historyLoaded = true; }
        }

        function refreshCurrentTab() {
            currentTab === 'price-changes' ? loadPriceChanges() : loadHistory();
        }

        function timeAgo(dateStr) {
            if (!dateStr || dateStr === '-') return '-';
            try {
                const date = new Date(dateStr.replace(/-/g, '/'));
                const now = new Date();
                const seconds = Math.floor((now - date) / 1000);
                if (seconds < 0) return '刚刚';
                if (seconds < 60) return '刚刚';
                const minutes = Math.floor(seconds / 60);
                if (minutes < 60) return minutes + '分钟前';
                const hours = Math.floor(minutes / 60);
                if (hours < 24) return hours + '小时前';
                const days = Math.floor(hours / 24);
                if (days < 30) return days + '天前';
                return dateStr.split(' ')[0];
            } catch (e) { return dateStr; }
        }

        function toggleTimeline(idx) {
            const row = document.getElementById('sku-row-' + idx);
            const panel = document.getElementById('timeline-' + idx);
            if (panel.classList.contains('open')) {
                panel.classList.remove('open'); row.classList.remove('expanded');
            } else {
                panel.classList.add('open'); row.classList.add('expanded');
            }
        }

        function loadPriceChanges() {
            const container = document.getElementById('sku-list-container');
            fetch('/api/price_changes').then(r => r.json()).then(data => {
                if (data.error) { container.innerHTML = `<div class="empty-state"><p>${data.error}</p></div>`; return; }
                const groups = data.sku_groups || [];
                document.getElementById('stat-total').textContent = groups.length;
                document.getElementById('stat-url-total').textContent = data.url_total || 0;
                document.getElementById('stat-changed').textContent = groups.filter(g => g.has_latest_change).length;
                document.getElementById('stat-time').textContent = data.last_fetch_time || '-';

                if (groups.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>暂无价格记录流</p></div>'; return;
                }

                container.innerHTML = groups.map((g, idx) => {
                    const tl = g.timeline || [];
                    const lastEntry = tl.length >= 2 ? tl[tl.length - 1] : null;
                    let diffHtml = '<span class="sku-diff flat">—</span>';
                    let priceColor = 'var(--text-main)';

                    if (g.is_off_shelf) {
                        diffHtml = '<span class="sku-diff" style="background:rgba(239, 68, 68, 0.2); color:var(--danger); border:1px solid rgba(239, 68, 68, 0.3);">下架</span>';
                        priceColor = 'var(--text-muted)';
                    } else if (lastEntry && lastEntry.diff) {
                        const isUp = lastEntry.diff > 0;
                        diffHtml = `<span class="sku-diff ${isUp ? 'up' : 'down'}">${isUp ? '↑' : '↓'} ${Math.abs(lastEntry.diff).toFixed(2)}</span>`;
                        priceColor = isUp ? 'var(--danger)' : 'var(--success)';
                    } else if (tl.length < 2) {
                        diffHtml = '<span class="sku-diff flat">NEW</span>';
                    }

                    const tlHtml = tl.map(entry => {
                        let innerDiff = entry.diff ? (entry.diff > 0 ? `<span style="color:var(--danger)">↑ +${entry.diff}</span>` : `<span style="color:var(--success)">↓ ${entry.diff}</span>`) : `<span style="color:var(--text-muted)">基准</span>`;
                        return `<div class="tl-row"><span class="tl-time">${entry.time}</span><span>￥${entry.price}</span>${innerDiff}</div>`;
                    }).join('');

                    return `
                        <div class="sku-row ${g.has_latest_change ? 'changed' : ''}" onclick="toggleTimeline(${idx})" id="sku-row-${idx}">
                            <div class="shop-name" title="${g.shop}">${g.shop}</div>
                            <div title="${g.product}" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                                #${g.url_no || "?"} 
                                <a href="${g.source_url}" target="_blank" onclick="event.stopPropagation()" style="color:inherit;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">
                                    ${g.product}
                                </a>
                            </div>
                            <div title="${g.sku}"><span style="background:rgba(255,255,255,0.05);padding:0.2rem 0.5rem;border-radius:4px;">${g.sku}</span></div>
                            <div style="text-align:right; color:var(--text-muted); font-size:0.75rem;">${timeAgo(g.timeline[g.timeline.length - 1].time)}</div>
                            <div class="sku-price" style="color: ${priceColor}">¥${g.latest_price.toFixed(2)}</div>
                            <div style="text-align:center;">${g.latest_stock || 0}</div>
                            <div style="text-align:right;">${diffHtml}</div>
                            <div class="sku-chevron"><i class="ri-arrow-down-s-line"></i></div>
                        </div>
                        <div class="timeline-panel" id="timeline-${idx}">${tlHtml}</div>
                    `;
                }).join('');
            });
        }

        function loadHistory() {
            fetch('/api/history').then(r => r.json()).then(data => {
                const tbody = document.getElementById('history-tbody');
                const theadRow = document.querySelector('#history-thead tr');
                if (data.error || !data.records || data.records.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>未发现历史归档数据</p></div></td></tr>`;
                    return;
                }

                const firstRow = data.records[0];
                const fixedCols = ['获取时间', '店铺名称', '商品名称', '商品规格'];
                const dynamicCols = Object.keys(firstRow).filter(k => !fixedCols.includes(k) && k !== '指纹' && k !== 'Unnamed: 0');

                theadRow.innerHTML = `<th>获取时间</th><th>店铺</th><th>商品名</th><th>规格</th>` +
                    dynamicCols.map(c => `<th style="text-align:right;">${c}</th>`).join('');

                tbody.innerHTML = data.records.map(row => {
                    return `<tr>
                        <td style="color:var(--text-muted); font-size:11px;">${row['获取时间']}</td>
                        <td style="color:var(--primary); font-weight:500;">${row['店铺名称']}</td>
                        <td>${row['商品名称']}</td>
                        <td><small>${row['商品规格']}</small></td>
                        ` + dynamicCols.map(c => `<td style="text-align:right; font-family:var(--font-mono);">${row[c]}</td>`).join('') + `
                    </tr>`;
                }).join('');
            });
        }

        // 初始化加载
        loadPriceChanges();
        // 自动刷新：每10分钟自动刷新一次页面数据
        setInterval(refreshCurrentTab, 600000);
    </script>
</body>

</html>
